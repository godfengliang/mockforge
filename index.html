<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MockForge — Test Data Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        brand: { 50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',800:'#065f46',900:'#064e3b',950:'#022c22' },
        surface: { 800:'#1e1e2e',700:'#252536',600:'#2d2d44',500:'#363652' }
      }
    }
  }
}
</script>
<style>
  body { background: #0f0f1a; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #1e1e2e; }
  ::-webkit-scrollbar-thumb { background: #363652; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a4a6a; }
  .field-item { transition: background 0.15s, transform 0.1s; }
  .field-item:hover { background: #2d2d44; }
  .field-item.dragging { opacity: 0.5; transform: scale(0.97); }
  .drag-over { border-top: 2px solid #10b981 !important; }
  select, input[type="number"], input[type="text"] {
    background: #1e1e2e; border: 1px solid #363652; color: #e2e8f0;
  }
  select:focus, input:focus { border-color: #10b981; outline: none; box-shadow: 0 0 0 2px rgba(16,185,129,0.2); }
  .btn-primary { background: linear-gradient(135deg, #059669, #10b981); }
  .btn-primary:hover { background: linear-gradient(135deg, #047857, #059669); }
  .btn-export { background: #1e1e2e; border: 1px solid #363652; }
  .btn-export:hover { border-color: #10b981; background: #252536; }
  .table-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn 0.2s ease-out; }
  .toast { animation: fadeIn 0.3s ease-out; }
</style>
</head>
<body class="text-gray-200 h-screen flex flex-col overflow-hidden">

<!-- Top Bar -->
<header class="flex-shrink-0 bg-surface-800 border-b border-surface-500 px-4 py-2.5 flex items-center gap-3 z-20">
  <div class="flex items-center gap-2 mr-2">
    <svg class="w-7 h-7 text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
    </svg>
    <span class="text-lg font-bold text-white tracking-tight">MockForge</span>
  </div>

  <div class="h-6 w-px bg-surface-500 mx-1"></div>

  <!-- Presets -->
  <div class="flex items-center gap-1.5">
    <span class="text-xs text-gray-400 mr-1">Presets:</span>
    <button onclick="loadPreset('users')" class="px-2.5 py-1 text-xs rounded-md bg-surface-700 hover:bg-surface-600 text-gray-300 transition-colors">Users</button>
    <button onclick="loadPreset('products')" class="px-2.5 py-1 text-xs rounded-md bg-surface-700 hover:bg-surface-600 text-gray-300 transition-colors">Products</button>
    <button onclick="loadPreset('orders')" class="px-2.5 py-1 text-xs rounded-md bg-surface-700 hover:bg-surface-600 text-gray-300 transition-colors">Orders</button>
    <button onclick="loadPreset('employees')" class="px-2.5 py-1 text-xs rounded-md bg-surface-700 hover:bg-surface-600 text-gray-300 transition-colors">Employees</button>
  </div>

  <div class="h-6 w-px bg-surface-500 mx-1"></div>

  <!-- Row count -->
  <div class="flex items-center gap-2">
    <label class="text-xs text-gray-400">Rows:</label>
    <input type="number" id="rowCount" value="100" min="1" max="10000" class="w-20 px-2 py-1 text-sm rounded-md">
  </div>

  <!-- Generate -->
  <button onclick="generateData()" class="btn-primary px-4 py-1.5 text-sm font-medium rounded-md text-white transition-all flex items-center gap-1.5">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
    Generate
  </button>

  <div class="flex-1"></div>

  <!-- Export buttons -->
  <div class="flex items-center gap-1.5">
    <button onclick="exportJSON()" class="btn-export px-3 py-1.5 text-xs rounded-md text-gray-300 transition-colors">JSON</button>
    <button onclick="exportCSV()" class="btn-export px-3 py-1.5 text-xs rounded-md text-gray-300 transition-colors">CSV</button>
    <button onclick="exportSQL()" class="btn-export px-3 py-1.5 text-xs rounded-md text-gray-300 transition-colors">SQL</button>
  </div>
</header>

<!-- Main Content -->
<div class="flex flex-1 overflow-hidden">

  <!-- Left Panel: Field Configuration -->
  <aside class="w-72 flex-shrink-0 bg-surface-800 border-r border-surface-500 flex flex-col overflow-hidden">
    <!-- Add field -->
    <div class="p-3 border-b border-surface-500">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-sm font-semibold text-gray-300">Fields</h2>
        <span id="fieldCount" class="text-xs text-gray-500">0 fields</span>
      </div>
      <div class="flex gap-1.5">
        <input type="text" id="newFieldName" placeholder="Field name" class="flex-1 px-2 py-1.5 text-sm rounded-md" onkeydown="if(event.key==='Enter')addField()">
        <select id="newFieldType" class="px-2 py-1.5 text-sm rounded-md w-32">
          <option value="FirstName">First Name</option>
          <option value="LastName">Last Name</option>
          <option value="FullName">Full Name</option>
          <option value="Username">Username</option>
          <option value="Email">Email</option>
          <option value="Phone">Phone</option>
          <option value="Address">Address</option>
          <option value="City">City</option>
          <option value="Country">Country</option>
          <option value="Company">Company</option>
          <option value="JobTitle">Job Title</option>
          <option value="URL">URL</option>
          <option value="IPAddress">IP Address</option>
          <option value="UUID">UUID</option>
          <option value="Date">Date</option>
          <option value="Number">Number</option>
          <option value="Boolean">Boolean</option>
          <option value="Paragraph">Paragraph</option>
          <option value="Password">Password</option>
          <option value="Color">Color</option>

      </div>
      <!-- Enum options (shown when type is Enum) -->
      <div id="enumOptionsRow" class="hidden mt-1.5">
        <input type="text" id="enumOptions" placeholder="Enum values (comma-separated)" class="w-full px-2 py-1.5 text-sm rounded-md">
      </div>
    </div>

    <!-- Field list -->
    <div id="fieldList" class="flex-1 overflow-y-auto p-2 space-y-1">
      <div id="emptyState" class="flex flex-col items-center justify-center h-full text-gray-500 text-sm">
        <svg class="w-10 h-10 mb-2 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        <span>Add fields or select a preset</span>
      </div>
    </div>

    <!-- Clear all -->
    <div class="p-3 border-t border-surface-500">
      <button onclick="clearAllFields()" class="w-full px-3 py-1.5 text-xs text-gray-400 hover:text-red-400 rounded-md hover:bg-surface-700 transition-colors">Clear All Fields</button>
    </div>
  </aside>

  <!-- Right Panel: Data Table -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Table info bar -->
    <div class="flex-shrink-0 px-4 py-2 bg-surface-800/50 border-b border-surface-500 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span id="dataInfo" class="text-xs text-gray-400">No data generated yet</span>
      </div>
      <div id="paginationTop" class="flex items-center gap-2 text-xs text-gray-400">
        <button onclick="prevPage()" id="btnPrev" class="px-2 py-1 rounded bg-surface-700 hover:bg-surface-600 disabled:opacity-30 disabled:cursor-not-allowed transition-colors" disabled>&larr; Prev</button>
        <span id="pageInfo">Page 0 / 0</span>
        <button onclick="nextPage()" id="btnNext" class="px-2 py-1 rounded bg-surface-700 hover:bg-surface-600 disabled:opacity-30 disabled:cursor-not-allowed transition-colors" disabled>Next &rarr;</button>
      </div>
    </div>

    <!-- Table -->
    <div class="flex-1 overflow-auto">
      <table class="w-full text-sm" id="dataTable">
        <thead class="bg-surface-800 sticky top-0 z-10">
          <tr id="tableHeader">
            <th class="text-left px-3 py-2 text-xs font-medium text-gray-400 border-b border-surface-500 w-10">#</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="99" class="text-center py-20 text-gray-500">
              <svg class="w-12 h-12 mx-auto mb-3 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
              Configure fields and click Generate
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Toast container -->
<div id="toastContainer" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

<script>
// ==========================================
// DATA POOLS
// ==========================================
const DATA = {
  firstNames: ['James','Mary','Robert','Patricia','John','Jennifer','Michael','Linda','David','Elizabeth','William','Barbara','Richard','Susan','Joseph','Jessica','Thomas','Sarah','Christopher','Karen','Charles','Lisa','Daniel','Nancy','Matthew','Betty','Anthony','Margaret','Mark','Sandra','Donald','Ashley','Steven','Kimberly','Paul','Emily','Andrew','Donna','Joshua','Michelle','Kenneth','Carol','Kevin','Amanda','Brian','Dorothy','George','Melissa','Timothy','Deborah','Ronald','Stephanie','Edward','Rebecca','Jason','Sharon','Jeffrey','Laura','Ryan','Cynthia','Jacob','Kathleen','Gary','Amy','Nicholas','Angela','Eric','Shirley','Jonathan','Anna','Stephen','Brenda','Larry','Pamela','Justin','Emma','Scott','Nicole','Brandon','Helen','Benjamin','Samantha','Samuel','Katherine','Gregory','Christine','Frank','Debra','Alexander','Rachel','Patrick','Carolyn','Raymond','Janet','Jack','Catherine','Dennis','Maria','Jerry','Heather','Tyler','Diane'],
  lastNames: ['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez','Hernandez','Lopez','Gonzalez','Wilson','Anderson','Thomas','Taylor','Moore','Jackson','Martin','Lee','Perez','Thompson','White','Harris','Sanchez','Clark','Ramirez','Lewis','Robinson','Walker','Young','Allen','King','Wright','Scott','Torres','Nguyen','Hill','Flores','Green','Adams','Nelson','Baker','Hall','Rivera','Campbell','Mitchell','Carter','Roberts','Gomez','Phillips','Evans','Turner','Diaz','Parker','Cruz','Edwards','Collins','Reyes','Stewart','Morris','Morales','Murphy','Cook','Rogers','Gutierrez','Ortiz','Morgan','Cooper','Peterson','Bailey','Reed','Kelly','Howard','Ramos','Kim','Cox','Ward','Richardson','Watson','Brooks','Chavez','Wood','James','Bennett','Gray','Mendoza','Ruiz','Hughes','Price','Alvarez','Castillo','Sanders','Patel','Myers','Long','Ross','Foster','Jimenez'],
  cities: ['New York','Los Angeles','Chicago','Houston','Phoenix','Philadelphia','San Antonio','San Diego','Dallas','San Jose','Austin','Jacksonville','Fort Worth','Columbus','Charlotte','Indianapolis','San Francisco','Seattle','Denver','Washington','Nashville','Oklahoma City','El Paso','Boston','Portland','Las Vegas','Memphis','Louisville','Baltimore','Milwaukee','Albuquerque','Tucson','Fresno','Sacramento','Mesa','Kansas City','Atlanta','Omaha','Colorado Springs','Raleigh','Miami','Long Beach','Virginia Beach','Oakland','Minneapolis','Tulsa','Arlington','Tampa','New Orleans','Wichita'],
  countries: ['United States','United Kingdom','Canada','Australia','Germany','France','Japan','Brazil','India','China','Mexico','South Korea','Italy','Spain','Netherlands','Sweden','Norway','Denmark','Finland','Switzerland','Austria','Belgium','Portugal','Ireland','New Zealand','Singapore','Thailand','Vietnam','Philippines','Indonesia','Poland','Czech Republic','Turkey','Israel','South Africa','Argentina','Chile','Colombia','Peru','Egypt'],
  companies: ['Acme Corp','Globex Inc','Initech','Umbrella Corp','Soylent Corp','Stark Industries','Wayne Enterprises','Cyberdyne Systems','Oscorp','Wonka Industries','Aperture Science','Massive Dynamic','Prestige Worldwide','Sterling Cooper','Dunder Mifflin','Pied Piper','Hooli','Avato','Plexifi','Corellia Tech','Zephyr Labs','Nova Systems','Atlas Group','Helix Digital','Prism Analytics','Vertex Solutions','Quantum Labs','Nexus Corp','Cipher Security','Ember Creative'],
  jobTitles: ['Software Engineer','Product Manager','Data Analyst','UX Designer','Marketing Manager','Sales Representative','Project Manager','Business Analyst','DevOps Engineer','QA Engineer','Frontend Developer','Backend Developer','Full Stack Developer','CTO','CEO','VP of Engineering','HR Manager','Financial Analyst','Operations Manager','Customer Success Manager','Graphic Designer','Content Writer','SEO Specialist','Scrum Master','Technical Lead','Solutions Architect','Data Scientist','Security Engineer','Mobile Developer','Cloud Engineer'],
  domains: ['gmail.com','yahoo.com','outlook.com','hotmail.com','protonmail.com','icloud.com','fastmail.com','zoho.com','mail.com','aol.com'],
  streets: ['Main St','Oak Ave','Maple Dr','Cedar Ln','Pine St','Elm St','Washington Blvd','Park Ave','Lake Dr','Hill Rd','Sunset Blvd','River Rd','Forest Ave','Meadow Ln','Spring St','Valley Dr','Highland Ave','Church St','Broadway','Market St'],
  words: ['lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','aliquip','ex','ea','commodo','consequat','duis','aute','irure','in','reprehenderit','voluptate','velit','esse','cillum','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','culpa','qui','officia','deserunt','mollit','anim','id','est','laborum','the','quick','brown','fox','jumps','over','lazy','dog','pack','my','box','with','five','dozen','liquor','jugs'],
  streetsNum: function() { return Math.floor(Math.random()*9999)+1; },
  zipCodes: function() { return String(Math.floor(Math.random()*90000)+10000); },
};

// ==========================================
// STATE
// ==========================================
let fields = [];
let generatedData = [];
let currentPage = 1;
const PAGE_SIZE = 50;
let fieldIdCounter = 0;

// ==========================================
// FIELD MANAGEMENT
// ==========================================
function addField(name, type, enumVals) {
  const nameInput = document.getElementById('newFieldName');
  const typeSelect = document.getElementById('newFieldType');
  const enumInput = document.getElementById('enumOptions');

  const fName = name || nameInput.value.trim();
  const fType = type || typeSelect.value;
  const fEnum = enumVals || (fType === 'Enum' ? enumInput.value.trim() : '');

  if (!fName) {
    nameInput.focus();
    return;
  }

  fields.push({ id: ++fieldIdCounter, name: fName, type: fType, enumValues: fEnum });
  nameInput.value = '';
  enumInput.value = '';
  renderFieldList();
  if (generatedData.length > 0) generateData();
}

function removeField(id) {
  fields = fields.filter(f => f.id !== id);
  renderFieldList();
  if (generatedData.length > 0) generateData();
  else clearTable();
}

function clearAllFields() {
  fields = [];
  fieldIdCounter = 0;
  renderFieldList();
  clearTable();
}

function clearTable() {
  generatedData = [];
  currentPage = 1;
  document.getElementById('tableHeader').innerHTML = '<th class="text-left px-3 py-2 text-xs font-medium text-gray-400 border-b border-surface-500 w-10">#</th>';
  document.getElementById('tableBody').innerHTML = '<tr><td colspan="99" class="text-center py-20 text-gray-500">Configure fields and click Generate</td></tr>';
  updatePagination();
}

function renderFieldList() {
  const list = document.getElementById('fieldList');
  const empty = document.getElementById('emptyState');
  document.getElementById('fieldCount').textContent = fields.length + ' field' + (fields.length !== 1 ? 's' : '');

  if (fields.length === 0) {
    list.innerHTML = '';
    list.appendChild(createEmptyState());
    return;
  }

  list.innerHTML = '';
  fields.forEach((f, idx) => {
    const div = document.createElement('div');
    div.className = 'field-item flex items-center gap-2 px-2 py-1.5 rounded-md cursor-grab border border-transparent';
    div.draggable = true;
    div.dataset.idx = idx;
    div.dataset.id = f.id;

    const typeColors = {
      FirstName:'text-blue-400',LastName:'text-blue-400',FullName:'text-blue-400',Username:'text-purple-400',
      Email:'text-amber-400',Phone:'text-amber-400',Address:'text-teal-400',City:'text-teal-400',Country:'text-teal-400',
      Company:'text-pink-400',JobTitle:'text-pink-400',URL:'text-cyan-400',IPAddress:'text-cyan-400',UUID:'text-cyan-400',
      Date:'text-orange-400',Number:'text-orange-400',Boolean:'text-red-400',Paragraph:'text-lime-400',
      Password:'text-purple-400',Color:'text-yellow-400',Enum:'text-indigo-400'
    };
    const tc = typeColors[f.type] || 'text-gray-400';

    div.innerHTML = `
      <span class="text-gray-600 cursor-grab text-xs">&#9776;</span>
      <span class="flex-1 text-sm text-gray-200 truncate">${esc(f.name)}</span>
      <span class="text-[10px] font-medium ${tc} bg-surface-700 px-1.5 py-0.5 rounded">${f.type}</span>
      <button onclick="removeField(${f.id})" class="text-gray-500 hover:text-red-400 transition-colors text-xs px-1">&times;</button>
    `;

    div.addEventListener('dragstart', onDragStart);
    div.addEventListener('dragover', onDragOver);
    div.addEventListener('dragleave', onDragLeave);
    div.addEventListener('drop', onDrop);
    div.addEventListener('dragend', onDragEnd);

    list.appendChild(div);
  });
}

function createEmptyState() {
  const div = document.createElement('div');
  div.id = 'emptyState';
  div.className = 'flex flex-col items-center justify-center h-full text-gray-500 text-sm';
  div.innerHTML = '<svg class="w-10 h-10 mb-2 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg><span>Add fields or select a preset</span>';
  return div;
}

// Drag and drop
let dragIdx = null;
function onDragStart(e) {
  dragIdx = parseInt(e.currentTarget.dataset.idx);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const targetIdx = parseInt(e.currentTarget.dataset.idx);
  if (dragIdx !== null && dragIdx !== targetIdx) {
    const item = fields.splice(dragIdx, 1)[0];
    fields.splice(targetIdx, 0, item);
    renderFieldList();
    if (generatedData.length > 0) generateData();
  }
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  dragIdx = null;
}

// Show/hide enum options
document.getElementById('newFieldType').addEventListener('change', function() {
  document.getElementById('enumOptionsRow').classList.toggle('hidden', this.value !== 'Enum');
});

// ==========================================
// DATA GENERATION
// ==========================================
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function generateUUID() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function generateValue(type, enumValues) {
  switch(type) {
    case 'FirstName': return pick(DATA.firstNames);
    case 'LastName': return pick(DATA.lastNames);
    case 'FullName': return pick(DATA.firstNames) + ' ' + pick(DATA.lastNames);
    case 'Username': return pick(DATA.firstNames).toLowerCase() + randInt(10,9999);
    case 'Email': return pick(DATA.firstNames).toLowerCase() + '.' + pick(DATA.lastNames).toLowerCase() + randInt(1,99) + '@' + pick(DATA.domains);
    case 'Phone': return '+1-' + randInt(200,999) + '-' + randInt(200,999) + '-' + randInt(1000,9999);
    case 'Address': return DATA.streetsNum() + ' ' + pick(DATA.streets);
    case 'City': return pick(DATA.cities);
    case 'Country': return pick(DATA.countries);
    case 'Company': return pick(DATA.companies);
    case 'JobTitle': return pick(DATA.jobTitles);
    case 'URL': return 'https://www.' + pick(DATA.companies).toLowerCase().replace(/[^a-z0-9]/g,'') + '.com/' + pick(['about','products','blog','contact','pricing','docs','api','careers']);
    case 'IPAddress': return randInt(1,255) + '.' + randInt(0,255) + '.' + randInt(0,255) + '.' + randInt(1,254);
    case 'UUID': return generateUUID();
    case 'Date': {
      const start = new Date(2018, 0, 1).getTime();
      const end = new Date(2026, 4, 17).getTime();
      const d = new Date(start + Math.random() * (end - start));
      return d.toISOString().split('T')[0];
    }
    case 'Number': return randInt(1, 10000);
    case 'Boolean': return Math.random() < 0.5;
    case 'Paragraph': {
      const count = randInt(8, 25);
      const words = [];
      for (let i = 0; i < count; i++) words.push(pick(DATA.words));
      words[0] = words[0][0].toUpperCase() + words[0].slice(1);
      return words.join(' ') + '.';
    }
    case 'Password': {
      const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%';
      let pw = '';
      for (let i = 0; i < randInt(10, 16); i++) pw += chars[Math.floor(Math.random() * chars.length)];
      return pw;
    }
    case 'Color': return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
    case 'Enum': {
      if (!enumValues) return 'undefined';
      const vals = enumValues.split(',').map(v => v.trim()).filter(v => v);
      if (vals.length === 0) return 'undefined';
      return pick(vals);
    }
    default: return 'unknown';
  }
}

function generateData() {
  if (fields.length === 0) {
    showToast('Add at least one field first', 'warn');
    return;
  }

  const count = Math.max(1, Math.min(10000, parseInt(document.getElementById('rowCount').value) || 100));
  document.getElementById('rowCount').value = count;

  generatedData = [];
  for (let i = 0; i < count; i++) {
    const row = {};
    fields.forEach(f => { row[f.name] = generateValue(f.type, f.enumValues); });
    generatedData.push(row);
  }

  currentPage = 1;
  renderTable();
  showToast(`Generated ${count.toLocaleString()} rows`, 'ok');
}

// ==========================================
// TABLE RENDERING
// ==========================================
function renderTable() {
  const header = document.getElementById('tableHeader');
  const body = document.getElementById('tableBody');

  // Header
  let hHTML = '<th class="text-left px-3 py-2 text-xs font-medium text-gray-500 border-b border-surface-500 w-10">#</th>';
  fields.forEach(f => {
    hHTML += `<th class="text-left px-3 py-2 text-xs font-medium text-gray-400 border-b border-surface-500">${esc(f.name)}</th>`;
  });
  header.innerHTML = hHTML;

  // Body
  const totalPages = Math.max(1, Math.ceil(generatedData.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const end = Math.min(start + PAGE_SIZE, generatedData.length);
  const pageData = generatedData.slice(start, end);

  if (pageData.length === 0) {
    body.innerHTML = '<tr><td colspan="99" class="text-center py-20 text-gray-500">No data</td></tr>';
  } else {
    let bHTML = '';
    pageData.forEach((row, i) => {
      bHTML += '<tr class="border-b border-surface-500/50 hover:bg-surface-700/40 transition-colors">';
      bHTML += `<td class="px-3 py-1.5 text-xs text-gray-500">${start + i + 1}</td>`;
      fields.forEach(f => {
        const val = row[f.name];
        let display;
        if (typeof val === 'boolean') {
          display = val ? '<span class="text-green-400 text-xs">&#10003; true</span>' : '<span class="text-red-400 text-xs">&#10007; false</span>';
        } else {
          display = esc(String(val));
        }
        bHTML += `<td class="px-3 py-1.5 text-sm table-cell text-gray-300" title="${esc(String(val))}">${display}</td>`;
      });
      bHTML += '</tr>';
    });
    body.innerHTML = bHTML;
  }

  // Info
  document.getElementById('dataInfo').textContent =
    `${generatedData.length.toLocaleString()} rows total, showing ${start + 1}-${end}`;

  updatePagination();
}

function updatePagination() {
  const totalPages = Math.max(1, Math.ceil(generatedData.length / PAGE_SIZE));
  document.getElementById('pageInfo').textContent = `Page ${currentPage} / ${totalPages}`;
  document.getElementById('btnPrev').disabled = currentPage <= 1;
  document.getElementById('btnNext').disabled = currentPage >= totalPages;
}

function prevPage() {
  if (currentPage > 1) { currentPage--; renderTable(); }
}
function nextPage() {
  const totalPages = Math.ceil(generatedData.length / PAGE_SIZE);
  if (currentPage < totalPages) { currentPage++; renderTable(); }
}

// ==========================================
// PRESETS
// ==========================================

  fields = [];

  const presets = {
    users: [
      { name:'id', type:'Number' },
      { name:'first_name', type:'FirstName' },
      { name:'last_name', type:'LastName' },
      { name:'username', type:'Username' },
      { name:'email', type:'Email' },
      { name:'phone', type:'Phone' },
      { name:'city', type:'City' },
      { name:'country', type:'Country' },
      { name:'registered', type:'Date' },
      { name:'active', type:'Boolean' },
    ],
    products: [
      { name:'id', type:'Number' },
      { name:'product_name', type:'Enum', enumValues:'Widget, Gadget, Doohickey, Thingamajig, Whatchamacallit, Gizmo, Contraption, Apparatus' },
      { name:'category', type:'Enum', enumValues:'Electronics, Clothing, Food, Toys, Tools, Sports, Books, Home' },
      { name:'price', type:'Number' },
      { name:'manufacturer', type:'Company' },
      { name:'color', type:'Color' },
      { name:'in_stock', type:'Boolean' },
      { name:'created_at', type:'Date' },
    ],
    orders: [
      { name:'order_id', type:'UUID' },
      { name:'customer_name', type:'FullName' },
      { name:'email', type:'Email' },
      { name:'shipping_address', type:'Address' },
      { name:'city', type:'City' },
      { name:'country', type:'Country' },
      { name:'amount', type:'Number' },
      { name:'status', type:'Enum', enumValues:'Pending, Processing, Shipped, Delivered, Cancelled, Refunded' },
      { name:'order_date', type:'Date' },
      { name:'tracking_ip', type:'IPAddress' },
    ],
    employees: [
      { name:'emp_id', type:'Number' },
      { name:'name', type:'FullName' },
      { name:'email', type:'Email' },
      { name:'department', type:'Enum', enumValues:'Engineering, Marketing, Sales, HR, Finance, Operations, Legal, Support' },
      { name:'job_title', type:'JobTitle' },
      { name:'company', type:'Company' },

      { name:'salary', type:'Number' },

  const preset = presets[name];

  preset.forEach(p => {
    fields.push({ id: ++fieldIdCounter, name: p.name, type: p.type, enumValues: p.enumValues || '' });
  });

  renderFieldList();

// ==========================================
// EXPORT
// ==========================================
function exportJSON() {
  if (!generatedData.length) { showToast('No data to export', 'warn'); return; }
  const json = JSON.stringify(generatedData, null, 2);
  downloadFile(json, 'mockforge_data.json', 'application/json');
  showToast('JSON exported', 'ok');
}

function exportCSV() {
  if (!generatedData.length) { showToast('No data to export', 'warn'); return; }
  const headers = fields.map(f => f.name);
  let csv = '﻿'; // BOM for Chinese Excel
  csv += headers.join(',') + '\n';
  generatedData.forEach(row => {
    const vals = headers.map(h => {
      let v = row[h];
      if (typeof v === 'string') v = '"' + v.replace(/"/g, '""') + '"';
      else v = String(v);
      return v;
    });
    csv += vals.join(',') + '\n';
  });
  downloadFile(csv, 'mockforge_data.csv', 'text/csv;charset=utf-8');
  showToast('CSV exported (with BOM)', 'ok');
}

function exportSQL() {
  if (!generatedData.length) { showToast('No data to export', 'warn'); return; }
  const tableName = 'mock_data';
  const cols = fields.map(f => '`' + f.name + '`').join(', ');
  let sql = '-- MockForge generated data\n';
  sql += '-- Table: ' + tableName + '\n\n';

  // Batch inserts (100 per statement)
  for (let i = 0; i < generatedData.length; i += 100) {
    const batch = generatedData.slice(i, i + 100);
    sql += 'INSERT INTO `' + tableName + '` (' + cols + ') VALUES\n';
    const vals = batch.map(row => {
      const v = fields.map(f => {
        const val = row[f.name];
        if (typeof val === 'string') return "'" + val.replace(/'/g, "\\'") + "'";
        if (typeof val === 'boolean') return val ? 'TRUE' : 'FALSE';
        return String(val);
      });
      return '  (' + v.join(', ') + ')';
    });
    sql += vals.join(',\n') + ';\n\n';
  }

  downloadFile(sql, 'mockforge_data.sql', 'text/plain');
  showToast('SQL exported', 'ok');
}

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ==========================================
// UTILITIES
// ==========================================
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const div = document.createElement('div');
  const colors = { ok: 'bg-green-900/80 text-green-300 border-green-700', warn: 'bg-yellow-900/80 text-yellow-300 border-yellow-700', error: 'bg-red-900/80 text-red-300 border-red-700' };
  div.className = 'toast px-4 py-2 rounded-lg border text-sm ' + (colors[type] || colors.ok);
  div.textContent = msg;
  container.appendChild(div);
  setTimeout(() => { div.style.opacity = '0'; div.style.transition = 'opacity 0.3s'; setTimeout(() => div.remove(), 300); }, 2500);
}

// ==========================================
// KEYBOARD SHORTCUTS
// ==========================================
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    generateData();
  }
});
</script>
